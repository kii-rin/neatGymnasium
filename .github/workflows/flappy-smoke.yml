name: Flappy smoke test

on:
  pull_request:
    paths:
      - "flappy/**"
      - "requirements.txt"
      - ".github/workflows/flappy-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Check environment and renderer
        working-directory: flappy
        run: python smoke_test.py
      - name: Run one NEAT generation
        working-directory: flappy
        run: python evolve-feedforward.py --generations 1 --workers 2
